<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Yaki Menu</title>

    <style>
        .card.ordered-flag {
            border: 2px solid red;
            box-shadow: 0 0 12px rgba(255, 0, 0, 0.5);
        }


        #orderedPanel {
            position: fixed;
            top: 0;
            right: 0;
            width: 360px;
            height: 100vh;
            background: rgba(25, 25, 25, 0.7);
            backdrop-filter: blur(30px);
            padding: 22px;
            border-left: none;
            overflow-y: auto;
            z-index: 998;
            transform: translateX(100%);
            transition: 0.35s ease;
        }

        /* Nửa trên - chạy từ giữa lên */
        #orderedPanel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 50%;
            background: linear-gradient(0deg,
                    #ff0000, #ff7f00, #ffff00, #00ff00,
                    #00ffff, #0000ff, #8b00ff, #ff00ff,
                    #ff0000, #ff7f00, #ffff00, #00ff00);
            background-size: 100% 300%;
            animation: rgbWaveUp 2s linear infinite;
        }

        /* Nửa dưới - chạy từ giữa xuống */
        #orderedPanel::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 3px;
            height: 50%;
            background: linear-gradient(180deg,
                    #ff0000, #ff7f00, #ffff00, #00ff00,
                    #00ffff, #0000ff, #8b00ff, #ff00ff,
                    #ff0000, #ff7f00, #ffff00, #00ff00);
            background-size: 100% 300%;
            animation: rgbWaveDown 2s linear infinite;
        }

        #orderedPanel.show {
            transform: translateX(0);
        }


        #customAlertOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(3px);
        }

        #customAlertBox {
            background: #1f1f1f;
            padding: 28px 30px;
            border-radius: 14px;
            width: 330px;
            text-align: center;
            color: #fff;
            border: 1.5px solid rgba(255, 100, 100, 0.35);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.45);
            animation: alertPop 0.35s ease forwards;
            opacity: 0;
            transform: scale(0.7);
        }

        @keyframes alertPop {
            0% {
                opacity: 0;
                transform: scale(0.7);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ===== CUSTOM CONFIRM ===== */
        #customConfirmOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(3px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2001;
        }

        #customConfirmBox {
            background: #1f1f1f;
            padding: 28px 30px;
            border-radius: 14px;
            width: 350px;
            text-align: center;
            color: #fff;
            border: 1.5px solid rgba(255, 100, 100, 0.35);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.45);
            animation: alertPop 0.35s ease forwards;
            opacity: 0;
            transform: scale(0.7);
        }

        .confirm-buttons {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        .confirm-btn {
            flex: 1;
            padding: 10px 0;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.25s;
        }

        #confirmCancelBtn {
            background: rgba(255, 255, 255, 0.1);
        }

        #confirmCancelBtn:hover {
            transform: scale(1.05);
        }

        #confirmOkBtn {
            background: linear-gradient(45deg, #ff4d4d, #ffa64d);
            color: #fff;
        }

        #confirmOkBtn:hover {
            transform: scale(1.07);
        }



        #alertOkBtn {
            margin-top: 20px;
            padding: 10px 22px;
            background: linear-gradient(45deg, #ff4d4d, #ffa64d);
            border-radius: 10px;
            cursor: pointer;
            display: inline-block;
            color: #fff;
            font-weight: bold;
            transition: 0.25s;
        }

        #alertOkBtn:hover {
            transform: scale(1.06);
        }



        /*===================Thùng ráC=================================*/

        .cart-clear-btn {
            font-size: 22px;
            color: #ff0000;
            cursor: pointer;
            margin-right: 14px;
        }

        .cart-item-delete {
            font-size: 18px;
            color: #bbbbbb;
            cursor: pointer;
            margin-left: 10px;
        }

        .cart-item-delete:hover {
            color: #ff5b5b;
        }




        /*=========================Ô số lượng trong giỏ hàng===================*/
        .cartQtyInput {
            width: 50px;
            padding: 6px;
            margin-left: 6px;
            margin-right: 6px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #888;
            border-radius: 6px;
            color: #fff;
            text-align: center;
            /* Ẩn mũi tên lên/xuống */
            -moz-appearance: textfield;
            -webkit-appearance: none;
            appearance: none;
        }

        .cartQtyInput::-webkit-inner-spin-button,
        .cartQtyInput::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .cart-qty-row {
            display: flex;
            align-items: center;
            margin-top: 6px;
        }

        .cart-qty-btn {
            width: 28px;
            height: 28px;
            background: rgba(80, 80, 80, 0.6);
            border: 1px solid #666;
            border-radius: 6px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .cart-qty-btn:hover {
            background: rgba(255, 100, 100, 0.4);
        }

        .cart-qty-btn:active {
            transform: scale(0.95);
        }


        /* ======================= GLOBAL ======================= */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at 20% 30%, #1b1b1b, #0c0c0c 70%);
            color: #fff;
            overflow-x: hidden;
        }

        /* ======================= HEADER ======================= */
        header {
            position: relative;
            padding: 18px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: none;
        }

        /* Nửa trái - chạy từ giữa sang trái */
        header::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 50%;
            height: 3px;
            background: linear-gradient(270deg,
                    #ff0000, #ff7f00, #ffff00, #00ff00,
                    #00ffff, #0000ff, #8b00ff, #ff00ff,
                    #ff0000, #ff7f00, #ffff00, #00ff00);
            background-size: 300% 100%;
            animation: rgbWaveLeft 2s linear infinite;
        }

        /* Nửa phải - chạy từ giữa sang phải */
        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 50%;
            height: 3px;
            background: linear-gradient(90deg,
                    #ff0000, #ff7f00, #ffff00, #00ff00,
                    #00ffff, #0000ff, #8b00ff, #ff00ff,
                    #ff0000, #ff7f00, #ffff00, #00ff00);
            background-size: 300% 100%;
            animation: rgbWaveRight 2s linear infinite;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            background: linear-gradient(90deg, #ff4d4d, #ff914d);
            -webkit-background-clip: text;
            color: transparent;
        }

        .header-controls {
            display: flex;
            gap: 10px;
        }

        select,
        button {
            padding: 8px 12px;
            border-radius: 10px;
            background: rgba(40, 40, 40, 0.6);
            color: #fff;
            border: 1px solid rgba(90, 90, 90, 0.5);
        }

        /* Ordered button multi-line styling */
        #orderedBtn {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.3;
            padding: 6px 10px;
        }

        #orderedBtnTotal {
            font-size: 11px;
            color: #ffa64d;
            font-weight: bold;
            margin-top: 2px;
        }

        /* Mobile Header */
        @media (max-width: 600px) {
            header {
                flex-direction: column;
                gap: 10px;
            }

            .header-controls {
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        /* ======================= TABS ======================= */
        .tabs {
            display: flex;
            overflow-x: auto;
            gap: 22px;
            padding: 12px 20px;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab {
            padding: 12px 22px;
            color: #ccc;
            cursor: pointer;
            white-space: nowrap;
            transition: transform 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
        }

        .tab:hover {
            transform: translateY(-6px) scale(1.05);
            color: #ff7b7b;
            box-shadow: 0 10px 25px rgba(255, 77, 77, 0.35);
            background: rgba(255, 77, 77, 0.08);
        }

        .tab.active {
            color: #ff7b7b;
            border-bottom: 2px solid #ff7b7b;
            background: rgba(255, 77, 77, 0.1);
        }


        /* ======================= MENU GRID ======================= */
        .container {
            padding: 25px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 26px;
        }

        @media (max-width: 1100px) {
            .container {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 800px) {
            .container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 550px) {
            .container {
                grid-template-columns: repeat(1, 1fr);
            }
        }

        /* ======================= CARD (UPGRADED) ======================= */
        .card {
            position: relative;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0px 6px 18px rgba(0, 0, 0, 0.35);
            transition: transform .25s ease, box-shadow .25s ease;
            padding: 16px;
            /* khoảng cách bên trong card */
        }

        .card:hover {
            transform: translateY(-6px) scale(1.015);
            box-shadow: 0 12px 28px rgba(255, 60, 60, 0.35);
        }


        .card img {
            width: 100%;
            height: 190px;
            object-fit: cover;
            transition: transform .35s ease;
        }

        /* Zoom ảnh nhẹ khi hover */
        .card:hover img {
            transform: scale(1.07);
        }


        .qty-row {
            margin-top: 14px;
            display: flex;
            align-items: center;
        }

        .qty-btn {
            width: 34px;
            height: 34px;
            background: rgba(80, 80, 80, 0.5);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
        }

        .add-cart-btn {
            margin-left: auto;
            background: linear-gradient(45deg, #ff4d4d, #ffa04d);
            padding: 8px 18px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }


        /* Card được chọn (đã có trong giỏ) */
        .card.selected {
            border: 2px solid #4ade80;
            /* xanh lá */
            box-shadow: 0 0 12px rgba(74, 222, 128, 0.6);
            position: relative;
        }

        /* Icon tick */
        .card .tick-mark {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #4ade80;
            color: #000;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 0 6px rgba(0, 0, 0, 0.4);
        }



        /* ======================= CART PANEL ======================= */
        #cartPanel {
            position: fixed;
            top: 0;
            right: 0;
            width: 360px;
            max-width: 100%;
            height: 100vh;
            background: rgba(25, 25, 25, 0.7);
            backdrop-filter: blur(30px);
            padding: 22px;
            border-left: none;
            overflow-y: auto;
            z-index: 999;
            transform: translateX(100%);
            transition: transform 0.35s ease;
        }

        /* Nửa trên - chạy từ giữa lên */
        #cartPanel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 50%;
            background: linear-gradient(0deg,
                    #ff0000, #ff7f00, #ffff00, #00ff00,
                    #00ffff, #0000ff, #8b00ff, #ff00ff,
                    #ff0000, #ff7f00, #ffff00, #00ff00);
            background-size: 100% 300%;
            animation: rgbWaveUp 2s linear infinite;
        }

        /* Nửa dưới - chạy từ giữa xuống */
        #cartPanel::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 3px;
            height: 50%;
            background: linear-gradient(180deg,
                    #ff0000, #ff7f00, #ffff00, #00ff00,
                    #00ffff, #0000ff, #8b00ff, #ff00ff,
                    #ff0000, #ff7f00, #ffff00, #00ff00);
            background-size: 100% 300%;
            animation: rgbWaveDown 2s linear infinite;
        }

        #cartPanel.show {
            transform: translateX(0);
        }

        .close-cart {
            font-size: 28px;
            color: #ff8080;
            cursor: pointer;
            text-align: right;
        }

        .cart-item {
            padding: 14px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        #orderBtn {
            width: 100%;
            margin-top: 18px;
            padding: 13px;
            background: linear-gradient(45deg, #ff4d4d, #ff9f4d);
            border-radius: 12px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
        }

        /* ======================= RGB WAVE EFFECT ======================= */
        @keyframes rgbWave {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* RGB Wave chạy sang trái (từ giữa ra) */
        @keyframes rgbWaveLeft {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 100% 50%;
            }
        }

        /* RGB Wave chạy sang phải (từ giữa ra) */
        @keyframes rgbWaveRight {
            0% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* RGB Wave chạy lên trên (từ giữa ra) */
        @keyframes rgbWaveUp {
            0% {
                background-position: 50% 0%;
            }

            100% {
                background-position: 50% 100%;
            }
        }

        /* RGB Wave chạy xuống dưới (từ giữa ra) */
        @keyframes rgbWaveDown {
            0% {
                background-position: 50% 100%;
            }

            100% {
                background-position: 50% 0%;
            }
        }


        /* ======================= SHAKE ======================= */
        @keyframes shake {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }


        .qty-input {
            width: 55px;
            padding: 6px 8px;
            text-align: center;
            background: rgba(80, 80, 80, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;

            /* Loại bỏ mũi tên tăng/giảm */
            -moz-appearance: textfield;
        }

        .qty-input::-webkit-inner-spin-button,
        .qty-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }


        .qty-input::-webkit-inner-spin-button,
        .qty-input::-webkit-outer-spin-button {
            opacity: 1;
        }

        /* ======================= AI CHATBOT ======================= */
        #aiChatBtn {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #667eea 0%, #a855f7 35%, #ec4899 70%, #f97316 100%);
            border: none;
            border-radius: 50px;
            padding: 10px 20px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #aiChatBtn:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 6px 20px rgba(236, 72, 153, 0.6);
        }

        #aiChatBtn .ai-icon {
            font-size: 18px;
            display: inline-block;
            animation: robotBounce 1s ease-in-out infinite, robotWiggle 2s ease-in-out infinite;
        }

        #aiChatBtnText {
            background: linear-gradient(90deg,
                    #00FFFF,
                    #FFFF00,
                    #7FFF00,
                    #00FFFF,
                    #FFD700,
                    #39FF14,
                    #00FFFF);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientTextFlow 2s linear infinite;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        @keyframes gradientTextFlow {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 100% 50%;
            }
        }

        @keyframes robotBounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-3px);
            }
        }

        @keyframes robotWiggle {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            25% {
                transform: translateY(-2px) rotate(-5deg);
            }

            50% {
                transform: translateY(-3px) rotate(0deg);
            }

            75% {
                transform: translateY(-2px) rotate(5deg);
            }
        }

        #aiChatPanel {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            width: 380px;
            max-width: 95%;
            height: 500px;
            max-height: 70vh;
            background: rgba(30, 30, 40, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(168, 85, 247, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            z-index: 1001;
            display: flex;
            flex-direction: column;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        #aiChatPanel.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) scale(1);
        }

        .ai-chat-header {
            padding: 15px 20px;
            background: linear-gradient(135deg, #667eea 0%, #a855f7 35%, #ec4899 70%, #f97316 100%);
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ai-chat-header h3 {
            margin: 0;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ai-chat-close {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: #fff;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        .ai-chat-close:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .ai-chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .ai-message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ai-message.bot {
            background: linear-gradient(135deg, #667eea 0%, #a855f7 50%, #ec4899 100%);
            color: #fff;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .ai-message.user {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .ai-message.thinking {
            background: rgba(168, 85, 247, 0.3);
            color: #aaa;
        }

        .ai-message.thinking::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {

            0%,
            20% {
                content: '.';
            }

            40% {
                content: '..';
            }

            60%,
            100% {
                content: '...';
            }
        }

        .ai-quick-responses {
            display: flex;
            gap: 10px;
            padding: 10px 15px;
            justify-content: center;
        }

        .ai-quick-btn {
            padding: 10px 25px;
            border-radius: 25px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .ai-quick-btn.yes {
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            color: #fff;
        }

        .ai-quick-btn.no {
            background: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
            color: #fff;
        }

        .ai-quick-btn:hover {
            transform: scale(1.05);
        }

        .ai-chat-input {
            display: flex;
            padding: 15px;
            gap: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ai-chat-input input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .ai-chat-input input:focus {

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script>

        const firebaseConfig = {
            apiKey: "AIzaSyCCTaXqidGM4DIyJnz1-zbg_6PdxmDpV30",
            authDomain: "food-order-at-table-to-kitchen.firebaseapp.com",
            projectId: "food-order-at-table-to-kitchen",
            storageBucket: "food-order-at-table-to-kitchen.firebasestorage.app",
            messagingSenderId: "179233667372",
            appId: "1:179233667372:web:76170af27a89ff778a9489"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        /* ======================= FIREBASE LISTENER ======================= */
        function listenToTableOrders() {
            const tableId = `table_${currentTableId}`;

            db.collection("tables").doc(tableId).onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    const firebaseOrders = data.orders || [];

                    // Convert Firebase orders array to orderedItems object
                    // Aggregate items with same ID
                    orderedItems = {};
                    firebaseOrders.forEach(item => {
                        if (!orderedItems[item.id]) {
                            orderedItems[item.id] = { ...item };
                        } else {
                            orderedItems[item.id].qty += item.qty;
                        }
                    });

                    renderOrderedItems();
                    renderMenu(); // Update red border on ordered items
                } else {
                    // Table doesn't exist in Firebase yet - clear ordered items
                    orderedItems = {};
                    renderOrderedItems();
                    renderMenu();
                }
            });
        }

        function renderOrderedItems() {
            const box = document.getElementById("orderedItems");
            box.innerHTML = "";

            let total = 0;

            for (let id in orderedItems) {
                const item = orderedItems[id];
                total += item.qty * item.price;

                box.innerHTML += `
            <div class="cart-item">
                <b>${item.name[currentLang]}</b><br>
                ${translations[currentLang].ordered.qty}: ${item.qty} × ${item.price.toLocaleString()} đ
            </div>
        `;
            }

            document.getElementById("orderedTotal").innerText = total.toLocaleString();
            document.getElementById("orderedCount").innerText =
                Object.values(orderedItems).reduce((a, b) => a + b.qty, 0);

            // Update total in header button
            document.getElementById("orderedBtnTotal").innerText = total.toLocaleString() + " đ";
        }


        /*=======================custom alert=========================*/
        function showAlert(msg) {
            const overlay = document.getElementById("customAlertOverlay");
            const box = document.getElementById("customAlertBox");

            document.getElementById("alertMessage").innerText = msg;

            overlay.style.display = "flex";

            // Reset animation để chạy lại mượt
            box.style.animation = "none";
            void box.offsetWidth; // trick restart animation
            box.style.animation = "alertPop 0.35s ease forwards";
        }

        function closeAlert() {
            const overlay = document.getElementById("customAlertOverlay");
            overlay.style.display = "none";
        }

        /* ======================= CUSTOM CONFIRM ======================= */
        let confirmCallback = null;

        function showConfirm(msg, callback) {
            confirmCallback = callback;

            // Hiển thị nội dung confirm
            document.getElementById("confirmMessage").innerText = msg;

            // Cập nhật nút theo ngôn ngữ hiện tại
            document.getElementById("confirmCancelBtn").innerText = translations[currentLang].confirm.cancel;
            document.getElementById("confirmOkBtn").innerText = translations[currentLang].confirm.ok;

            const overlay = document.getElementById("customConfirmOverlay");
            const box = document.getElementById("customConfirmBox");

            overlay.style.display = "flex";

            // Reset animation để chạy lại mượt
            box.style.animation = "none";
            void box.offsetWidth; // trick restart animation
            box.style.animation = "alertPop 0.35s ease forwards";
        }

        function closeConfirm(result) {
            // Ẩn overlay
            document.getElementById("customConfirmOverlay").style.display = "none";

            // Chỉ gọi callback nếu có
            if (confirmCallback) confirmCallback(result);
        }

        /* ======================= CLEAR CART ======================= */
        function clearCart() {
            // Hiển thị confirm trước khi xóa toàn bộ giỏ hàng
            showConfirm(translations[currentLang].confirm.clearAll, function (ok) {

                if (!ok) return; // Nhấn Cancel → giữ nguyên trạng thái

                // Nếu nhấn OK → xóa toàn bộ
                for (let id in cart) {
                    cart[id].qty = 0;
                    cart[id].tempQty = 0;
                }

                updateCart();
                renderMenu();
            });
        }


        /*=======================xóa từng món=========================*/

        function deleteItem(id) {
            cart[id].qty = 0;
            cart[id].tempQty = 0;

            updateCart();
            renderMenu();
        }


        /*=================xóa toàn bộ giỏ hàng=======================*/

        function clearCart() {
            showConfirm(translations[currentLang].confirm.clearAll, function (ok) {

                if (!ok) return; // Nhấn Cancel → không làm gì

                // Nhấn OK → xóa toàn bộ giỏ hàng
                for (let id in cart) {
                    cart[id].qty = 0;
                    cart[id].tempQty = 0;
                }

                updateCart();
                renderMenu();
            });
        }





        /*==================Chức năng cho ô số lượng giỏ hàng========*/

        let cartQtyTimeout = null; // Debounce timer

        function changeCartQty(input) {
            const id = input.dataset.id;
            let newQty = input.value;

            // Rỗng → không cập nhật gì (để user nhập tiếp)
            if (newQty === "") return;

            newQty = Number(newQty);
            if (newQty < 0) newQty = 0;

            // Cập nhật data ngay nhưng KHÔNG render lại cart
            cart[id].qty = newQty;
            cart[id].tempQty = newQty;

            // Clear timeout cũ
            if (cartQtyTimeout) clearTimeout(cartQtyTimeout);

            // Debounce: Chờ 400ms sau khi ngừng gõ mới render
            cartQtyTimeout = setTimeout(() => {
                if (newQty === 0) {
                    // Xóa khỏi giỏ
                    updateCart();
                    renderMenu();
                } else {
                    // Cập nhật tổng tiền và số lượng hiển thị
                    updateCartTotals();
                    renderMenu();
                }
            }, 400);
        }

        // Hàm chỉ cập nhật tổng tiền mà KHÔNG render lại cart items
        function updateCartTotals() {
            let total = 0, count = 0;

            for (let id in cart) {
                if (cart[id].qty > 0) {
                    total += cart[id].qty * cart[id].price;
                    count += cart[id].qty;
                }
            }

            document.getElementById("totalPrice").innerText = total.toLocaleString();
            document.getElementById("cartCount").innerText = count;
        }

        // Hàm xử lý khi nhấn nút +/- trong giỏ hàng
        function changeCartQtyBtn(id, delta) {
            let newQty = Math.max(0, (cart[id].qty || 0) + delta);

            cart[id].qty = newQty;
            cart[id].tempQty = newQty;

            if (newQty === 0) {
                // Xóa khỏi giỏ
                updateCart();
                renderMenu();
            } else {
                // Cập nhật giỏ hàng và menu
                updateCart();
                renderMenu();
            }
        }


        /* ======================= NGÔN NGỮ ======================= */
        const translations = {
            vi: {
                tabs: { nuong: "Món nướng", lau: "Lẩu", mon_phu: "Món phụ", nuoc: "Đồ uống", khai_vi: "Khai vị", trang_mieng: "Tráng miệng" },
                buttons: { add: "Thêm", order: "Xác nhận đặt món", cart: "Giỏ", ordered: "Đã gọi" },

             ${cart[item.id].qty > 0 ? '<div class="tick-mark">✓</div>' : ""}

            <img src="${item.img}">
            <div class="card-body">
                <div style="font-size:18px;font-weight:bold;">${item.name[currentLang]}</div>
                <div class="price">${item.price.toLocaleString()} đ</div>

                <div class="qty-row">
                    <div class="qty-btn" onclick="changeQty(${item.id}, -1)">−</div>
                    <input type="number"
                     id="qtyInput_${item.id}"
                     class="qty-input"
                     value="${cart[item.id].tempQty ?? cart[item.id].qty}"
                     min="0"
                     oninput="updateTempQty(${item.id}, this.value)">

                    <div class="qty-btn" onclick="changeQty(${item.id}, 1)">+</div>

        /* ======================= TAB ======================= */
        function changeTab(tab, event) {
            currentTab = tab;
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            event.target.classList.add("active");
            renderMenu();
        }

        /* ======================= QTY ======================= */
        function changeQty(id, val) {
            if (!cart[id].tempQty) cart[id].tempQty = 0;

            cart[id].tempQty = Math.max(0, Number(cart[id].tempQty) + val);

            const num = cart[id].tempQty;
            document.getElementById(`qtyInput_${id}`).value = num;

            // 🔥 Nếu món đã trong giỏ → cập nhật giỏ ngay
            if (cart[id].qty > 0) {

                if (num === 0) {
                    cart[id].qty = 0;
                    updateCart();
                    renderMenu();
                    return;
                }

                cart[id].qty = num;
                updateCart();
                renderCartItems();
            }

            renderMenu();
        }


        function updateTempQty(id, value) {
            // Cho phép xoá hết để gõ lại mà không bị reset
            if (value === "") {
                cart[id].tempQty = 0;
                return;
            }

            let num = Number(value);
            if (isNaN(num)) return;

            num = Math.max(0, num);
            cart[id].tempQty = num;

            // Nếu món này đã nằm trong giỏ thì cập nhật luôn SL thật + tổng tiền
            if (cart[id].qty > 0) {
                if (num === 0) {
                    cart[id].qty = 0;
                    updateCart();   // chỉ cập nhật giỏ, KHÔNG render lại menu
                    renderMenu();   // 🔥 thêm dòng này để gỡ tick ngay lập tức
                    return;
                }

                cart[id].qty = num;
                updateCart();       // cập nhật tổng + danh sách trong giỏ
            }
        }




        /* ======================= ADD TO CART ======================= */
        function addToCart(id) {
            const temp = Number(cart[id].tempQty || 0);

            if (temp > 0) {
                cart[id].qty = temp;  // CẬP NHẬT GIỎ
                updateCart();
                renderMenu();

            }

            // Animation rung
            const el = document.getElementById("cartCount");
            el.style.animation = "shake 0.4s";
            setTimeout(() => el.style.animation = "", 400);
        }

        /* ======================= UPDATE CART ======================= */
        function updateCart() {
            let total = 0, count = 0;

            for (let id in cart) {
                if (cart[id].qty > 0) {
                    total += cart[id].qty * cart[id].price;
                    count += cart[id].qty;
                }
            }

            // total ordered
            let orderedTotal = 0;
            for (let id in orderedItems) {
                orderedTotal += orderedItems[id].qty * orderedItems[id].price;
            }

            // total final
            document.getElementById("totalPrice").innerText =
                (total + orderedTotal).toLocaleString();


            document.getElementById("totalPrice").innerText = total.toLocaleString();
            document.getElementById("cartCount").innerText = count;
            renderCartItems();
        }

        /* ======================= CART ITEMS ======================= */
        function renderCartItems() {
            const box = document.getElementById("cartItems");
            box.innerHTML = "";

            for (let id in cart) {
                if (cart[id].qty > 0) {
                    box.innerHTML += `
<div class="cart-item">
    <b>${cart[id].name[currentLang]}</b><br>

    <div class="cart-qty-row">
        ${translations[currentLang].cart.qty}:
        <span class="cart-qty-btn" onclick="changeCartQtyBtn(${id}, -1)">−</span>
        <input class="cartQtyInput"
            type="number"
            value="${cart[id].qty}"
            min="0"
            data-id="${id}"
            oninput="changeCartQty(this)">
        <span class="cart-qty-btn" onclick="changeCartQtyBtn(${id}, 1)">+</span>
        × ${cart[id].price.toLocaleString()} đ
        <span class="cart-item-delete" onclick="deleteItem(${id})">🗑️</span>
    </div>
</div>`;


                }
            }
        }

        /* ======================= CART PANEL ======================= */



        function toggleCart() {
            document.getElementById("cartPanel").classList.toggle("show");
        }

        function toggleOrdered() {
            document.getElementById("orderedPanel").classList.toggle("show");
        }


        /* ======================= ORDER ======================= */
        function placeOrder() {
            let hasItems = false;
            let itemsToOrder = [];

            for (let id in cart) {
                if (cart[id].qty > 0) {
                    hasItems = true;
                    itemsToOrder.push({
                        id: id,
                        name: cart[id].name, // Lưu cả object tên đa ngôn ngữ
                        price: cart[id].price,
                        qty: cart[id].qty
                    });
                }
            }

            if (!hasItems) {
                showAlert(translations[currentLang].messages.emptyCart);
                return;
            }

            // Lấy bàn từ URL parameter
            const tableIndex = currentTableId;
            const tableId = `table_${tableIndex}`;

            // Gửi lên Firebase
            const tableRef = db.collection("tables").doc(tableId);

            // Gửi lên Firebase và chờ kết quả
            tableRef.get().then((doc) => {
                let currentOrders = [];
                if (doc.exists) {
                    currentOrders = doc.data().orders || [];
                }

                // Nối thêm món mới
                const newOrders = currentOrders.concat(itemsToOrder);

                // Update lại
                return tableRef.set({
                    name: `Bàn ${tableIndex}`,
                    orders: newOrders,
                    lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
            }).then(() => {
                // Sau khi gửi thành công, clear giỏ hàng
                // orderedItems sẽ tự động cập nhật qua Firebase listener
                for (let id in cart) {
                    if (cart[id].qty > 0) {
                        cart[id].qty = 0;
                        cart[id].tempQty = 0;
                    }
                }

                updateCart();
                renderMenu();
                showAlert(translations[currentLang].messages.orderSent);

        /* ======================= URL PARAMETER HANDLING ======================= */
        // Lấy table ID từ URL parameter (ví dụ: ?table=3)
        function getTableIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const tableParam = urlParams.get('table');

            if (tableParam) {
                const tableNum = parseInt(tableParam);
                // Validate table number (1-10)
                if (tableNum >= 1 && tableNum <= 10) {
                    return tableNum;
                }
            }

            // Default to table 1 if no valid parameter
            return 1;
        }

        /* INIT */
        // Lấy table ID từ URL và cập nhật hiển thị
        currentTableId = getTableIdFromUrl();
        document.getElementById("tableDisplay").innerText = `${translations[currentLang].table} ${currentTableId}`;

        // Start listening to Firebase for real-time updates
        listenToTableOrders();

        renderMenu();

        // Using Cloudflare Worker proxy to secure API key
        const GEMINI_API_URL = 'https://gemini-proxy.yaki-api.workers.dev';

        // Chatbot state
        let aiChatState = {
            step: 0, // 0: greeting, 1: ask guests, 2: ask budget, 3: ask alcohol, 4: show recommendations, 5: confirm add
            guests: 0,
            budget: 0,
            wantsAlcohol: false,
            recommendations: [],
            isOpen: false
        };

        // Toggle chatbot panel
        function toggleAiChat() {
            const panel = document.getElementById("aiChatPanel");
            aiChatState.isOpen = !aiChatState.isOpen;
            panel.classList.toggle("show");

            // If opening for first time or reset, start conversation
            if (aiChatState.isOpen && aiChatState.step === 0) {
                startAiConversation();
            }
        }

        // Start/restart conversation
        function startAiConversation() {
            const messagesDiv = document.getElementById("aiChatMessages");
            messagesDiv.innerHTML = "";
            aiChatState = {
                step: 1,
                guests: 0,
                budget: 0,
                wantsAlcohol: false,
                recommendations: [],
                isOpen: true
            };

            // Show greeting then ask guests
            addBotMessage(translations[currentLang].chatbot.greeting);
            setTimeout(() => {
                addBotMessage(translations[currentLang].chatbot.askGuests);
            }, 500);

            showInputArea();
            hideQuickResponses();
        }

        // Add bot message to chat
        function addBotMessage(text) {
            const messagesDiv = document.getElementById("aiChatMessages");
            const msgDiv = document.createElement("div");
            msgDiv.className = "ai-message bot";
            msgDiv.innerHTML = text.replace(/\n/g, "<br>");
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Add user message to chat
        function addUserMessage(text) {
            const messagesDiv = document.getElementById("aiChatMessages");
            const msgDiv = document.createElement("div");
            msgDiv.className = "ai-message user";
            msgDiv.textContent = text;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Add thinking indicator
        function addThinkingMessage() {
            const messagesDiv = document.getElementById("aiChatMessages");
            const msgDiv = document.createElement("div");
            msgDiv.className = "ai-message bot thinking";
            msgDiv.id = "thinkingMsg";
            msgDiv.textContent = translations[currentLang].chatbot.thinking;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Remove thinking indicator
        function removeThinkingMessage() {
            const thinkingMsg = document.getElementById("thinkingMsg");
            if (thinkingMsg) thinkingMsg.remove();
        }

        // Show/hide UI elements
        function showInputArea() {
            document.getElementById("aiChatInputArea").style.display = "flex";
        }

        function hideInputArea() {
            document.getElementById("aiChatInputArea").style.display = "none";
        }

        function showQuickResponses() {
            document.getElementById("aiQuickResponses").style.display = "flex";
        }

        function hideQuickResponses() {
            document.getElementById("aiQuickResponses").style.display = "none";
        }

        // Send user message from input
        function sendAiMessage() {
            const input = document.getElementById("aiChatInput");
            const text = input.value.trim();
            if (!text) return;

            addUserMessage(text);
            input.value = "";

            processUserInput(text);
        }

        // Handle quick response buttons (0 or 1)
        function handleQuickResponse(value) {
            addUserMessage(value === 1 ? translations[currentLang].chatbot.yes : translations[currentLang].chatbot.no);
            hideQuickResponses();

            if (aiChatState.step === 3) {
                // Alcohol preference answered
                aiChatState.wantsAlcohol = value === 1;
                aiChatState.step = 4;
                getRecommendations();
            } else if (aiChatState.step === 5) {
                // Confirm add to cart
                if (value === 1) {
                    addRecommendationsToCart();
                    addBotMessage(translations[currentLang].chatbot.addedToCart);
                } else {
                    addBotMessage(translations[currentLang].chatbot.notAdded);
                }
                // Reset for new conversation
                setTimeout(() => {
                    aiChatState.step = 0;
                }, 1000);
            }
        }

        // Process user text input based on current step
        function processUserInput(text) {
            switch (aiChatState.step) {
                case 1: // Waiting for number of guests
                    const guests = parseInt(text);
                    if (isNaN(guests) || guests < 1) {
                        addBotMessage(translations[currentLang].chatbot.askGuests);
                        return;
                    }
                    aiChatState.guests = guests;
                    aiChatState.step = 2;
                    addBotMessage(translations[currentLang].chatbot.askBudget);
                    break;

                case 2: // Waiting for budget
                    const budget = parseInt(text.replace(/[,.\s]/g, ""));
                    if (isNaN(budget) || budget < 1000) {
                        addBotMessage(translations[currentLang].chatbot.askBudget);
                        return;
                    }
                    aiChatState.budget = budget;
                    aiChatState.step = 3;
                    addBotMessage(translations[currentLang].chatbot.askAlcohol);
                    hideInputArea();
                    showQuickResponses();
                    break;
            }
        }

        // Build menu context for AI
        function buildMenuContext() {
            let menuText = "MENU (prices in VND):\n\n";

            for (const category in products) {
                const categoryName = translations[currentLang].tabs[category] || category;
                menuText += `=== ${categoryName} ===\n`;

                products[category].forEach(item => {
                    const name = item.name[currentLang] || item.name.vi;
                    const isAlcohol = item.id === 12 || item.id === 30; // Beer and Wine
                    menuText += `- ID:${item.id}, ${name}, ${item.price.toLocaleString()}đ${isAlcohol ? " (alcohol)" : ""}\n`;
                });
                menuText += "\n";
            }

            return menuText;
        }

        // Get recommendations from Gemini API
        async function getRecommendations() {
            addThinkingMessage();
            hideInputArea();

            const menuContext = buildMenuContext();
            const langName = {
                vi: "Vietnamese",
                en: "English",
                zh: "Chinese",
                ja: "Japanese",
                ko: "Korean"
            }[currentLang];

            const prompt = `You are a restaurant assistant at Yaki, a Korean BBQ restaurant.

${menuContext}

Customer information:
- Number of guests: ${aiChatState.guests}
- Budget: ${aiChatState.budget.toLocaleString()} VND
- Wants alcoholic beverages: ${aiChatState.wantsAlcohol ? "Yes" : "No"}

Recommend dishes for this customer. Stay within budget. Include variety: main dishes, sides, drinks.
${aiChatState.wantsAlcohol ? "Include beer/wine." : "Only non-alcoholic drinks."}

IMPORTANT: Respond in ${langName} language. DO NOT explain or add any extra text.

Format EXACTLY like this:
- [Item Name] x[quantity] - [price]đ [ID:X]
${translations[currentLang].chatbot.total}: [total price]đ`;

            try {
                const response = await fetch(GEMINI_API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        prompt: prompt
                    })
                });

                const data = await response.json();
                removeThinkingMessage();

                if (data.success && data.response) {
                    const aiResponse = data.response;
                    parseAndShowRecommendations(aiResponse);
                } else {
                    console.error("Worker error:", data.error);
                    addBotMessage(translations[currentLang].chatbot.error);
                    showInputArea();
                    aiChatState.step = 1;
                }
            } catch (error) {
                console.error("Gemini API error:", error);
                removeThinkingMessage();
                addBotMessage(translations[currentLang].chatbot.error);
                showInputArea();
                aiChatState.step = 1;
            }
        }

        // Parse AI response and show recommendations
        function parseAndShowRecommendations(response) {
            // Remove [ID:X] from display but keep for parsing
            const displayResponse = response.replace(/\s*\[ID:\d+\]/g, '');
            // Show the AI's response without IDs
            addBotMessage(displayResponse.replace(/\n/g, "<br>"));

            // Try to extract item IDs from the response
            aiChatState.recommendations = [];
            const idPattern = /x(\d+)[^\[]*\[ID:(\d+)\]/gi;
            let match;

            while ((match = idPattern.exec(response)) !== null) {
                const qty = parseInt(match[1]);
                const itemId = parseInt(match[2]);

                // Find the product
                for (const category in products) {
                    const product = products[category].find(p => p.id === itemId);
                    if (product) {
                        aiChatState.recommendations.push({
                            ...product,
                            qty: qty
                        });
                        break;
                    }
                }
            }

            // If no IDs found, try to match by name
            if (aiChatState.recommendations.length === 0) {
                for (const category in products) {
                    products[category].forEach(product => {
                        const nameVi = product.name.vi.toLowerCase();
                        const nameEn = product.name.en.toLowerCase();
                        const nameCurrent = product.name[currentLang]?.toLowerCase() || "";

                        if (response.toLowerCase().includes(nameVi) ||
                            response.toLowerCase().includes(nameEn) ||
                            response.toLowerCase().includes(nameCurrent)) {

                            // Try to find quantity
                            const qtyMatch = response.match(new RegExp(`${product.name[currentLang]}[^x]*x\\s*(\\d+)`, "i")) ||
                                response.match(new RegExp(`${product.name.vi}[^x]*x\\s*(\\d+)`, "i"));
                            const qty = qtyMatch ? parseInt(qtyMatch[1]) : 1;

                            if (!aiChatState.recommendations.find(r => r.id === product.id)) {
                                aiChatState.recommendations.push({
                                    ...product,
                                    qty: qty
                                });
                            }
                        }
                    });
                }
            }

            // Ask for confirmation
            aiChatState.step = 5;
            setTimeout(() => {
                addBotMessage(translations[currentLang].chatbot.confirmAdd);
                showQuickResponses();
            }, 500);
        }

        // Add recommendations to cart
        function addRecommendationsToCart() {
            aiChatState.recommendations.forEach(item => {
                if (!cart[item.id]) {
                    cart[item.id] = { ...item, qty: 0, tempQty: 0 };
                }
                cart[item.id].qty += item.qty;
                cart[item.id].tempQty = cart[item.id].qty;
            });

            updateCart();
            renderMenu();

            // Animation on cart button
            const el = document.getElementById("cartCount");
            el.style.animation = "shake 0.4s";
            setTimeout(() => el.style.animation = "", 400);
        }

        // Update chatbot UI when language changes
        function updateChatbotLanguage() {
            document.getElementById("aiChatBtnText").innerText = translations[currentLang].chatbot.btnText;
            document.getElementById("aiChatTitle").innerText = translations[currentLang].chatbot.title;
            document.getElementById("aiYesText").innerText = translations[currentLang].chatbot.yes;
            document.getElementById("aiNoText").innerText = translations[currentLang].chatbot.no;
            document.getElementById("aiChatInput").placeholder = translations[currentLang].chatbot.inputPlaceholder;
            document.getElementById("aiSendBtn").innerText = translations[currentLang].chatbot.send;
        }

        // Initialize chatbot language
        updateChatbotLanguage();
    </script>

    <!-- Service Worker Registration for Image Caching -->
    <script>
        // Đăng ký Service Worker để cache ảnh
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => {
                        console.log('✅ Service Worker registered - Images will be cached!');

                        // Kiểm tra số lượng ảnh đã cache (optional)
                        if (registration.active) {
                            registration.active.postMessage({ action: 'getCacheStats' });
                        }

                        // Preload tất cả ảnh ngay khi SW sẵn sàng
                        preloadAllImages();
                    })
                    .catch((error) => {
                        console.log('⚠️ Service Worker registration failed:', error);
                        // Vẫn preload ảnh dù SW fail
                        preloadAllImages();
                    });

                // Lắng nghe message từ Service Worker
                navigator.serviceWorker.addEventListener('message', (event) => {
                    if (event.data.action === 'cacheStats') {
                        console.log(`📦 Cached images: ${event.data.count}`);
                    }
                    if (event.data.action === 'preloadComplete') {
                        console.log(`🎉 All images preloaded and cached!`);
                    }
                });
            });
        } else {
            // Nếu không hỗ trợ SW, vẫn preload ảnh để browser tự cache
            window.addEventListener('load', preloadAllImages);
        }

        /**
         * Preload TẤT CẢ ảnh sản phẩm ngay khi trang mở
         * Ảnh sẽ được tải và cache ngay lập tức
         */
        function preloadAllImages() {
            // Thu thập tất cả URL ảnh từ products object
            const allImageUrls = [];

            for (const category in products) {
                products[category].forEach(item => {
                    if (item.img) {
                        allImageUrls.push(item.img);
                    }
                });
            }

            console.log(`🚀 Preloading ${allImageUrls.length} images...`);

            let loadedCount = 0;
            let errorCount = 0;

            // Tạo Image objects để preload
            allImageUrls.forEach((url, index) => {
                const img = new Image();

                img.onload = () => {
                    loadedCount++;
                    // Log tiến trình mỗi 5 ảnh
                    if (loadedCount % 5 === 0 || loadedCount === allImageUrls.length) {
                        console.log(`📷 Preloaded: ${loadedCount}/${allImageUrls.length} images`);
                    }

                    // Khi tất cả ảnh đã load xong
                    if (loadedCount + errorCount === allImageUrls.length) {
                        console.log(`✅ Preload complete! ${loadedCount} loaded, ${errorCount} failed`);
                    }
                };

                img.onerror = () => {
                    errorCount++;
                    console.warn(`⚠️ Failed to preload: ${url.substring(0, 50)}...`);

                    if (loadedCount + errorCount === allImageUrls.length) {
                        console.log(`✅ Preload complete! ${loadedCount} loaded, ${errorCount} failed`);
                    }
                };

                // Bắt đầu tải ảnh
                img.src = url;
            });
        }

        // Hàm xóa cache ảnh (gọi khi cần)
        function clearImageCache() {
            if (navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({ action: 'clearImageCache' });
            }
        }

        /* ======================= DOUBLE-CLICK/TAP TO CLOSE PANELS ======================= */
        // Biến theo dõi double-tap cho mobile
        let lastTapTime = 0;
        const DOUBLE_TAP_DELAY = 300; // ms

        // Hàm kiểm tra click có nằm ngoài panel không
        function isOutsidePanel(target) {
            const cartPanel = document.getElementById('cartPanel');
            const orderedPanel = document.getElementById('orderedPanel');
            const aiChatPanel = document.getElementById('aiChatPanel');

            // Không đóng nếu click vào các panel hoặc các nút điều khiển
            if (cartPanel.contains(target) ||
                orderedPanel.contains(target) ||
                (aiChatPanel && aiChatPanel.contains(target)) ||
                target.closest('#cartBtn') ||
                target.closest('#orderedBtn') ||
                target.closest('#aiChatBtn') ||
                target.closest('.header-controls')) {
                return false;
            }
            return true;
        }

        // Hàm đóng các panel đang mở
        function closePanelsIfOpen() {
            const cartPanel = document.getElementById('cartPanel');
            const orderedPanel = document.getElementById('orderedPanel');
            let closed = false;

            if (cartPanel.classList.contains('show')) {
                cartPanel.classList.remove('show');
                closed = true;
            }
            if (orderedPanel.classList.contains('show')) {
                orderedPanel.classList.remove('show');
                closed = true;
            }
            return closed;
        }

        // Double-click để đóng (Desktop)
        document.addEventListener('dblclick', function (e) {
            if (isOutsidePanel(e.target)) {
                closePanelsIfOpen();
            }
        });

        // Double-tap để đóng (Mobile/Touch)
        document.addEventListener('touchend', function (e) {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTapTime;

            if (tapLength < DOUBLE_TAP_DELAY && tapLength > 0) {
                // Double-tap detected
                if (isOutsidePanel(e.target)) {
                    e.preventDefault(); // Ngăn zoom trên mobile
                    closePanelsIfOpen();
                }
            }
            lastTapTime = currentTime;
        });
    </script>

</body>

</html>
